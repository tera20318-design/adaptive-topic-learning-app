<!DOCTYPE html>
<html lang="ja" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#f8fafc">
    <title>Adaptive Topic Learning App</title>
    <link rel="manifest" href="./manifest.webmanifest">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="./nanoin-app/styles.css">
</head>
<body class="bg-stone-50 text-slate-800">
    <div id="app"></div>

    <noscript>
        <div class="mx-auto max-w-3xl p-6">
            <div class="rounded-3xl border border-amber-300 bg-amber-50 p-6 text-amber-900">
                JavaScript が無効です。このアプリは学習内容の切替と図解表示に JavaScript を使います。
            </div>
        </div>
    </noscript>
    <script>
        (function () {
            const root = document.getElementById("app");
            const topicScripts = {
                nanoin: ["./nanoin-app/topic-nanoin.js", "./nanoin-app/topic-nanoin-ui.js"],
                xrf: ["./nanoin-app/topic-xrf.js", "./nanoin-app/topic-xrf-ui.js"],
                taver: ["./nanoin-app/topic-taver.js", "./nanoin-app/topic-taver-ui.js"],
                epma: ["./nanoin-app/topic-epma.js", "./nanoin-app/topic-epma-ui.js"],
                ir: ["./nanoin-app/topic-ir.js", "./nanoin-app/topic-ir-ui.js"]
            };
            const sharedScripts = [
                "./nanoin-app/content.js",
                "./nanoin-app/storage.js",
                "./nanoin-app/ai.js",
                "./nanoin-app/app.js"
            ];
            const requested = new URLSearchParams(window.location.search).get("topic");
            const topicId = Object.prototype.hasOwnProperty.call(topicScripts, requested) ? requested : "nanoin";
            const scriptQueue = [...topicScripts[topicId], ...sharedScripts];

            function showBootError(message) {
                if (!root) {
                    return;
                }
                root.innerHTML = `
                    <div class="mx-auto max-w-4xl px-4 py-10 sm:px-6">
                        <div class="rounded-[32px] border border-rose-200 bg-white p-8 shadow-[0_24px_80px_rgba(15,23,42,0.12)]">
                            <div class="text-xs font-bold tracking-[0.22em] text-rose-600">BOOT ERROR</div>
                            <h1 class="mt-3 text-4xl font-black text-slate-950">初期化に失敗しました</h1>
                            <p class="mt-4 text-base leading-8 text-slate-600">
                                JavaScript の読み込み順かキャッシュが壊れている可能性があります。まず再読み込みし、それでも直らなければ下の内容を確認してください。
                            </p>
                            <div class="mt-6 rounded-[24px] bg-slate-50 p-5 text-sm leading-7 text-slate-700">${String(message)}</div>
                            <div class="mt-6 flex flex-wrap gap-3">
                                <button class="rounded-full bg-slate-900 px-5 py-3 text-sm font-bold text-white" onclick="location.reload()">再読み込み</button>
                                <button class="rounded-full border border-slate-300 bg-white px-5 py-3 text-sm font-bold text-slate-700" onclick="localStorage.clear(); location.reload()">保存状態を消して再読み込み</button>
                            </div>
                        </div>
                    </div>
                `;
            }

            window.addEventListener("error", (event) => {
                showBootError(`${event.message} @ ${event.filename || "inline"}:${event.lineno || 0}:${event.colno || 0}`);
            });

            window.addEventListener("unhandledrejection", (event) => {
                const reason = event.reason && event.reason.stack ? event.reason.stack : String(event.reason);
                showBootError(reason);
            });

            function loadScript(src) {
                return new Promise((resolve, reject) => {
                    const script = document.createElement("script");
                    script.src = src;
                    script.onload = () => resolve(src);
                    script.onerror = () => reject(new Error(`failed to load ${src}`));
                    document.body.appendChild(script);
                });
            }

            (async function boot() {
                try {
                    for (const src of scriptQueue) {
                        await loadScript(src);
                    }
                } catch (error) {
                    showBootError(error && error.stack ? error.stack : String(error));
                }
            })();
        })();
    </script>
</body>
</html>
